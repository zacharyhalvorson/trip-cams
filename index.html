<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Live highway cameras along your driving route across the US and Canada">
  <title>Trip Cams</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="img/icon.svg" type="image/svg+xml">
  <link rel="icon" href="img/favicon.ico" sizes="48x48">
  <link rel="icon" type="image/png" sizes="32x32" href="img/favicon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="img/icon-192.png">
  <link rel="apple-touch-icon" href="img/apple-touch-icon.png">
  <link rel="preconnect" href="https://unpkg.com" crossorigin>
  <link rel="preconnect" href="https://a.basemaps.cartocdn.com" crossorigin>
  <link rel="dns-prefetch" href="https://corsproxy.io">
  <link rel="dns-prefetch" href="https://511.alberta.ca">
  <link rel="dns-prefetch" href="https://www.drivebc.ca">
  <link rel="dns-prefetch" href="https://router.project-osrm.org">
  <link rel="dns-prefetch" href="https://photon.komoot.io">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" crossorigin="">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" crossorigin="">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Header -->
  <header class="header" id="header">
    <div class="header-title">
      <svg class="header-logo" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      <h1>Trip Cams</h1>
    </div>
    <div class="route-selector">
      <div class="route-input" id="fromInput" tabindex="0" role="combobox" aria-label="Starting point">
        <span class="route-label">From</span>
        <span class="route-value" id="fromValue">Calgary, AB</span>
      </div>
      <button class="swap-btn" id="swapBtn" title="Swap start and end" aria-label="Swap start and end">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 7h16M20 7l-4-4M20 7l-4 4M20 17H4M4 17l4-4M4 17l4 4"/>
        </svg>
      </button>
      <div class="route-input" id="toInput" tabindex="0" role="combobox" aria-label="Destination">
        <span class="route-label">To</span>
        <span class="route-value" id="toValue">Seattle, WA</span>
      </div>
    </div>
  </header>

  <!-- Location Dropdown -->
  <div class="dropdown-overlay" id="dropdownOverlay"></div>
  <div class="dropdown" id="dropdown">
    <div class="dropdown-header">
      <input type="text" class="dropdown-search" id="dropdownSearch" placeholder="Search any city or town..." autocomplete="off">
    </div>
    <ul class="dropdown-list" id="dropdownList"></ul>
  </div>

  <!-- Map -->
  <div class="map-container" id="mapContainer">
    <div id="map"></div>
  </div>

  <!-- Bottom Sheet -->
  <div class="sheet" id="sheet">
    <button class="map-center-btn" id="centerMapBtn" aria-label="Center on my location">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
        <path d="M2.5 11.4a1.2 1.2 0 0 1-.1-2.2L20 2.3a1.2 1.2 0 0 1 1.6 1.6l-6.9 17.7a1.2 1.2 0 0 1-2.2-.1l-2.7-7.3-7.3-2.8z"/>
      </svg>
    </button>
    <button class="map-toggle" id="mapToggle" aria-label="Toggle satellite view">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
    </button>
    <div class="sheet-handle" id="sheetHandle">
      <div class="sheet-handle-bar"></div>
    </div>

    <!-- Camera List -->
    <div class="camera-list" id="cameraList">
      <!-- Pull to refresh -->
      <div class="ptr" id="pullToRefresh">
        <div class="ptr-spinner">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M21 12a9 9 0 1 1-6.22-8.56"/>
          </svg>
        </div>
      </div>
      <div class="skeleton-list hidden" id="skeletonList"></div>
    </div>
  </div>

  <!-- Image Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 id="modalName"></h2>
        <button class="modal-close" id="modalClose" aria-label="Close">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="modal-image-container">
        <img id="modalImage" alt="Camera view" width="640" height="480">
        <div class="modal-loading" id="modalLoading">
          <div class="spinner"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Offline Banner -->
  <div class="offline-banner" id="offlineBanner">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/>
    </svg>
    <span>Showing cached data</span>
  </div>

  <!-- Scripts -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin="" defer></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" crossorigin="" defer></script>
  <script src="js/cameras.js" defer></script>
  <script src="js/api.js" defer></script>
  <script src="js/map.js" defer></script>
  <script src="js/app.js" defer></script>
</body>
</html>
